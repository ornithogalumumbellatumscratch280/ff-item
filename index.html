<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Item Library</title>

  <!-- Meta SEO -->
  <meta name="description" content="FF Item Library - Complete Free Fire item explorer. Skins, bundles, emotes, characters, pets, and more. Fast & responsive.">
  <meta name="keywords" content="Free Fire, FF Items, Skins, Bundles, Emotes, Characters, Pets, Cosmetics, Web App, Item Database">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="x.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body, html { height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ff416c, #ff4b2b); color: #fff; text-align: center; }
    .container { animation: fadeIn 2s ease-in-out; }
    h1 { font-size: 3rem; margin-bottom: 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); }
    p { font-size: 1.2rem; margin-bottom: 30px; }
    .button { padding: 15px 40px; background: #fff; color: #ff4b2b; font-weight: bold; border-radius: 50px; text-decoration: none; font-size: 1.1rem; transition: 0.3s; }
    .button:hover { background: #ff416c; color: #fff; transform: scale(1.05); }
    .countdown { margin-top: 15px; font-size: 1rem; color: #fffcc0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px);} to { opacity: 1; transform: translateY(0); } }
  </style>

</head>
<body>
  <div class="container">
    <h1>Welcome to FF Item Library</h1>
    <p>Redirecting you to the complete Free Fire item explorer...</p>
    <a href="https://ff-item.netlify.app/" class="button">Go Now</a>
    <div class="countdown">Redirecting in <span id="timer">5</span> seconds</div>
  </div>

  <!-- Countdown & Redirect Script -->
  <script>
    let seconds = 5;
    const timerEl = document.getElementById('timer');

    const countdown = setInterval(() => {
      seconds--;
      timerEl.textContent = seconds;
      if(seconds <= 0) {
        clearInterval(countdown);
        window.location.href = "https://ff-item.netlify.app/";
      }
    }, 1000);
  </script>
</body>
</html>
