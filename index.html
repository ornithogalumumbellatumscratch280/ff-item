<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Item Library</title>
  
  <!-- Meta for SEO -->
  <meta name="description" content="FF Item Library - Complete Free Fire item explorer. Skins, bundles, emotes, characters, and more. Fast & responsive.">
  <meta name="keywords" content="Free Fire, FF Items, Skins, Bundles, Emotes, Characters, Pets, Cosmetics, Web App, Item Database">

  <!-- Favicon -->
  <link rel="icon" href="https://ff-item.netlify.app/x.png" type="image/x-icon">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body, html { height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ff416c, #ff4b2b); color: #fff; text-align: center; }
    h1 { font-size: 3rem; margin-bottom: 20px; animation: fadeIn 2s ease-in-out; }
    p { font-size: 1.2rem; margin-bottom: 30px; animation: fadeIn 3s ease-in-out; }
    .button { padding: 15px 30px; background: #fff; color: #ff4b2b; font-weight: bold; border-radius: 50px; text-decoration: none; transition: 0.3s; }
    .button:hover { background: #ff416c; color: #fff; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px);} to { opacity: 1; transform: translateY(0); } }
  </style>

  <!-- Redirect after 5 seconds -->
  <script>
    setTimeout(() => {
      window.location.href = "https://ff-item.netlify.app/";
    }, 5000);
  </script>
</head>
<body>
  <div>
    <h1>Welcome to FF Item Library</h1>
    <p>Redirecting you to the full Free Fire item explorer...</p>
    <a href="https://ff-item.netlify.app/" class="button">Go Now</a>
    <p style="margin-top: 15px; font-size: 0.9rem;">Automatically redirecting in 5 seconds</p>
  </div>
</body>
</html>
